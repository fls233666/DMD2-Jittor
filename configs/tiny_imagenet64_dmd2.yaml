# Tiny-ImageNet-64 main presentation run.
# Requires a converted Jittor Tiny-ImageNet EDM teacher checkpoint when
# REAL_UNET_CHECKPOINT is set.

name: tiny_imagenet64_dmd2
script: scripts/train_image_dmd2.sh
purpose: planned_main_presentation_experiment
status: runnable

dataset:
  name: tiny-imagenet
  root: data/tiny-imagenet-200
  image_size: 64
  num_classes: 200
  classes: all
  augment: true

model:
  dataset_name: tinyimagenet
  config_name: tinyimagenet
  resolution: 64
  label_dim: 200
  sigma_data: 0.5
  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  num_train_timesteps: 1000
  min_step_percent: 0.02
  max_step_percent: 0.98
  gan_classifier: true

env:
  DATASET_NAME: tiny-imagenet
  RUN_NAME: tiny_imagenet64_dmd2
  USE_CUDA: "1"
  DATA_ROOT: data/tiny-imagenet-200
  IMAGE_SIZE: "64"
  LABEL_DIM: "200"
  CLASS_SUBSET: ""
  MAX_STEPS: "30000"
  BATCH_SIZE: "16"
  MAX_SAMPLES: "100000"
  LOG_INTERVAL: "100"
  CHECKPOINT_INTERVAL: "1000"
  EVAL_INTERVAL: "500"
  TEACHER_CONFIG: tinyimagenet
  REAL_UNET_CHECKPOINT: ""
  INIT_FAKE_FROM_REAL: "0"
  INIT_GENERATOR_FROM_REAL: "0"
  DFAKE_GEN_UPDATE_RATIO: "1"
  GAN_CLASSIFIER: "1"
  GEN_CLS_LOSS_WEIGHT: "3e-3"
  CLS_LOSS_WEIGHT: "1e-2"
  DIFFUSION_GAN: "1"
  DIFFUSION_GAN_MAX_TIMESTEP: "1000"

training:
  max_steps: 30000
  batch_size: 16
  optimizer: adam
  lr_generator: 0.0001
  lr_guidance: 0.0001
  conditioning_sigma: 80.0
  dfake_gen_update_ratio: 1

ablations:
  - full
  - without_gan
  - without_ttur
  - without_backward_simulation

records:
  checkpoint_dir: checkpoints/tiny_imagenet64_dmd2
  sample_dir: outputs/samples/tiny_imagenet64_dmd2
  metrics_log: logs/tiny_imagenet64_dmd2/train_metrics.jsonl
  performance_log: logs/tiny_imagenet64_dmd2/performance.jsonl
  loss_curve: outputs/curves/tiny_imagenet64_dmd2_loss.svg
  performance_curve: outputs/curves/tiny_imagenet64_dmd2_performance.svg
  fid_output: outputs/fid_results/tiny_imagenet64_dmd2_fid.json
